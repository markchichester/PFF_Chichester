<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 NFL QB Annual</title>
    <meta name="description" content="The definitive interactive quarterback evaluation — grades, splits, accuracy, pressure, clutch play and more for every NFL QB." />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap"
      rel="stylesheet"
    />
    <!-- Profile renderer CSS is injected here at runtime (unchanged pipeline) -->
    <style id="profileStyles"></style>

    <!-- ============ ANNUAL SKIN — design system overrides ============ -->
    <style id="annualSkin">
      :root {
        --team: #00338d;
        --team-deep: #001a47;
        --accent: #00338d;
        --team-ink: #ffffff;
        --paper: #f5f6f8;
        --ink: #0e0f12;
        --bar-h: 60px;
        --radius: 22px;
        --shadow-card: 0 1px 2px rgba(14, 15, 18, 0.04), 0 12px 32px rgba(14, 15, 18, 0.06);
        --shadow-card-hover: 0 2px 4px rgba(14, 15, 18, 0.05), 0 22px 48px rgba(14, 15, 18, 0.1);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      html, body { margin: 0; padding: 0; }

      body {
        font-family: "Archivo", system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(1200px 480px at 80% -120px, color-mix(in srgb, var(--team) 10%, transparent), transparent 70%),
          radial-gradient(900px 420px at -10% 8%, color-mix(in srgb, var(--team) 6%, transparent), transparent 70%),
          var(--paper);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition: background 0.6s ease;
      }

      ::selection { background: color-mix(in srgb, var(--accent) 22%, transparent); }

      /* ---------- scroll progress ---------- */
      .progress {
        position: fixed; top: 0; left: 0; height: 3px; width: 0%;
        background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 45%, #fff));
        z-index: 200; transition: width 0.08s linear;
      }

      /* ---------- top bar ---------- */
      .topbar {
        position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
        display: flex; align-items: center; gap: 14px;
        padding: 0 clamp(14px, 3vw, 28px);
        z-index: 150;
        transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        border-bottom: 1px solid transparent;
      }
      .topbar.is-stuck {
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(14px) saturate(1.4);
        -webkit-backdrop-filter: blur(14px) saturate(1.4);
        border-bottom-color: rgba(14, 15, 18, 0.07);
        box-shadow: 0 8px 30px rgba(14, 15, 18, 0.05);
      }
      .brand {
        display: inline-flex; align-items: baseline; gap: 8px;
        font-weight: 900; letter-spacing: 0.08em; font-size: 0.86rem;
        cursor: pointer; user-select: none; white-space: nowrap;
        color: var(--hero-fg, #fff); transition: color 0.3s ease;
        background: none; border: 0; padding: 0; font-family: inherit;
      }
      .topbar.is-stuck .brand { color: var(--ink); }
      .brand .yr {
        color: var(--hero-fg, #fff); opacity: 0.55; font-weight: 700;
        transition: color 0.3s ease;
      }
      .topbar.is-stuck .brand .yr { color: var(--accent); opacity: 1; }

      .topbar-spacer { flex: 1; }

      .qb-switch-btn {
        display: inline-flex; align-items: center; gap: 10px;
        height: 40px; padding: 0 14px 0 6px;
        border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.12);
        color: var(--hero-fg, #fff);
        font-family: inherit; font-weight: 700; font-size: 0.86rem;
        cursor: pointer; transition: all 0.25s ease;
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        max-width: 56vw;
      }
      .topbar.is-stuck .qb-switch-btn {
        background: #fff; color: var(--ink); border-color: rgba(14, 15, 18, 0.12);
        box-shadow: 0 4px 14px rgba(14, 15, 18, 0.07);
      }
      .qb-switch-btn:hover { transform: translateY(-1px); }
      .qb-switch-btn img {
        width: 30px; height: 30px; border-radius: 50%; object-fit: cover;
        background: color-mix(in srgb, var(--team) 25%, #fff);
        flex: 0 0 30px;
      }
      .qb-switch-btn .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .qb-switch-btn .hint-k {
        font-size: 0.66rem; font-weight: 800; opacity: 0.55;
        border: 1px solid currentColor; border-radius: 5px; padding: 1px 5px;
      }

      .nav-arrows { display: inline-flex; gap: 6px; }
      .nav-arrow, .season-select {
        height: 40px; border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.12); color: var(--hero-fg, #fff);
        font-family: inherit; font-weight: 800; font-size: 0.85rem;
        cursor: pointer; transition: all 0.25s ease;
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      }
      .nav-arrow { width: 40px; }
      .season-select { padding: 0 10px; appearance: none; -webkit-appearance: none; }
      .topbar.is-stuck .nav-arrow,
      .topbar.is-stuck .season-select {
        background: #fff; color: var(--ink); border-color: rgba(14, 15, 18, 0.12);
      }
      .nav-arrow:hover { transform: translateY(-1px); }
      .season-select option { color: #0e0f12; }

      /* ---------- hero ---------- */
      .hero {
        position: relative; overflow: hidden;
        color: var(--hero-fg, #fff);
        background:
          radial-gradient(900px 540px at 78% 0%, color-mix(in srgb, #fff 14%, transparent), transparent 60%),
          radial-gradient(1100px 600px at 12% 110%, color-mix(in srgb, #000 28%, transparent), transparent 65%),
          linear-gradient(132deg, var(--team-deep) 0%, var(--team) 58%, color-mix(in srgb, var(--team) 78%, #000) 100%);
        padding: calc(var(--bar-h) + clamp(26px, 5vh, 56px)) clamp(18px, 4vw, 40px) 0;
        transition: background 0.6s ease;
      }
      .hero-inner { max-width: 1180px; margin: 0 auto; position: relative; }

      .hero-watermark {
        position: absolute; right: -2%; top: 44%; transform: translateY(-50%);
        font-size: clamp(90px, 17vw, 260px); font-weight: 900; letter-spacing: -0.04em;
        text-transform: uppercase; white-space: nowrap;
        color: transparent;
        -webkit-text-stroke: 1.5px color-mix(in srgb, var(--hero-fg, #fff) 14%, transparent);
        pointer-events: none; user-select: none; line-height: 1;
      }

      .hero-grid {
        position: relative; display: flex; align-items: center;
        gap: clamp(20px, 4vw, 56px);
        padding-bottom: clamp(26px, 4vh, 44px);
      }
      .hero-copy { flex: 1 1 auto; min-width: 0; }
      .hero-kicker {
        display: inline-flex; align-items: center; gap: 8px;
        margin: 0 0 14px; padding: 7px 14px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--hero-fg, #fff) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--hero-fg, #fff) 22%, transparent);
        font-size: 0.74rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
      }
      .hero-kicker .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.7; }
      .hero-name {
        margin: 0; font-size: clamp(2.6rem, 7vw, 5.4rem);
        line-height: 0.96; font-weight: 900; letter-spacing: -0.03em; text-transform: uppercase;
        text-wrap: balance;
      }
      .hero-sub {
        margin: 14px 0 0; font-size: clamp(0.9rem, 1.6vw, 1.05rem);
        font-weight: 600; opacity: 0.85; max-width: 540px;
      }

      .hero-photo-wrap { position: relative; flex: 0 0 auto; }
      .hero-photo {
        width: clamp(180px, 24vw, 300px); height: clamp(180px, 24vw, 300px);
        border-radius: 50%; object-fit: cover; object-position: top center;
        background:
          radial-gradient(circle at 50% 30%, color-mix(in srgb, #fff 30%, var(--team)), var(--team-deep));
        border: 4px solid color-mix(in srgb, var(--hero-fg, #fff) 30%, transparent);
        box-shadow:
          0 0 0 10px color-mix(in srgb, var(--hero-fg, #fff) 7%, transparent),
          0 30px 70px rgba(0, 0, 0, 0.4);
      }

      /* hero stat strip — sits in its own band, overlapping the hero edge */
      .hero { padding-bottom: clamp(52px, 7vh, 78px); }
      .hero-stats-band { padding: 0 clamp(18px, 4vw, 40px); position: relative; z-index: 5; }
      .hero-stats {
        position: relative; display: grid;
        grid-template-columns: auto repeat(5, minmax(0, 1fr));
        gap: clamp(8px, 1.2vw, 14px);
        max-width: 1180px; margin: clamp(-58px, -6vh, -44px) auto 0;
      }
      .hero-stat, .hero-grade-card {
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(14, 15, 18, 0.07);
        border-radius: 18px; padding: 14px 16px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
        color: var(--ink);
        min-width: 0;
      }
      .hero-grade-card {
        display: flex; align-items: center; gap: 14px; padding: 12px 18px 12px 12px;
      }
      .grade-ring { width: 74px; height: 74px; flex: 0 0 74px; position: relative; }
      .grade-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
      .grade-ring .bg { stroke: rgba(14, 15, 18, 0.08); }
      .grade-ring .fg {
        stroke: var(--accent); stroke-linecap: round;
        transition: stroke-dasharray 1.1s cubic-bezier(0.22, 1, 0.36, 1), stroke 0.4s ease;
      }
      .grade-ring .val {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 1.25rem; letter-spacing: -0.02em;
      }
      .grade-meta .lbl {
        font-size: 0.64rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
        color: #6b7280; margin: 0 0 3px;
      }
      .grade-meta .rk { font-size: 0.95rem; font-weight: 800; color: var(--accent); margin: 0; }
      .grade-meta .rk small { color: #9ca3af; font-weight: 700; }

      .hero-stat .lbl {
        margin: 0 0 6px; font-size: 0.62rem; font-weight: 800;
        letter-spacing: 0.12em; text-transform: uppercase; color: #6b7280;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .hero-stat .val {
        margin: 0; font-size: clamp(1.3rem, 2.4vw, 1.9rem);
        font-weight: 900; letter-spacing: -0.02em; line-height: 1;
      }

      /* ---------- section nav rail ---------- */
      .rail-wrap {
        position: sticky; top: var(--bar-h); z-index: 120;
        margin-top: 22px;
        background: color-mix(in srgb, var(--paper) 86%, transparent);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(14, 15, 18, 0.06);
      }
      .rail {
        display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
        max-width: 1180px; margin: 0 auto; padding: 10px clamp(14px, 3vw, 28px);
      }
      .rail::-webkit-scrollbar { display: none; }
      .rail-chip {
        flex: 0 0 auto; padding: 8px 14px; border-radius: 999px;
        border: 1px solid rgba(14, 15, 18, 0.1); background: #fff;
        font-family: inherit; font-size: 0.74rem; font-weight: 800;
        letter-spacing: 0.05em; text-transform: uppercase; color: #4b5563;
        cursor: pointer; white-space: nowrap; transition: all 0.22s ease;
      }
      .rail-chip:hover { border-color: var(--accent); color: var(--accent); }
      .rail-chip.is-active {
        background: var(--accent); border-color: var(--accent);
        color: var(--accent-ink, #fff);
        box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 35%, transparent);
      }

      /* ---------- content shell ---------- */
      .content {
        max-width: 1180px; margin: 0 auto;
        padding: clamp(22px, 3.4vw, 40px) clamp(14px, 3vw, 28px) 30px;
      }

      .data-notes {
        margin: 0 0 18px; font-size: 0.78rem; font-weight: 700; color: #8a8f98;
      }
      .data-notes button {
        background: none; border: 0; padding: 0; font: inherit; color: var(--accent);
        cursor: pointer; text-decoration: underline;
      }
      .data-notes ul { margin: 8px 0 0; padding-left: 18px; font-weight: 600; }

      .site-footer {
        max-width: 1180px; margin: 0 auto;
        padding: 34px clamp(14px, 3vw, 28px) 60px;
        display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between;
        font-size: 0.78rem; font-weight: 700; color: #9aa0a8;
        border-top: 1px solid rgba(14, 15, 18, 0.07);
      }
      .site-footer .f-brand { color: var(--ink); font-weight: 900; letter-spacing: 0.08em; }

      /* =========================================================
         RE-SKIN of the untouched profile renderers
         ========================================================= */

      /* replace built-in hero with our cinematic one */
      .qb-profile > .qb-hero { display: none !important; }

      .qb-profile {
        max-width: none !important;
        background: transparent !important;
        counter-reset: qbsec;
      }

      .qb-section { padding: 0 !important; margin: 0 0 18px; }

      /* collapsible sections → elevated numbered cards */
      .qb-collapsible-details {
        border: 1px solid rgba(14, 15, 18, 0.06) !important;
        border-radius: var(--radius) !important;
        box-shadow: var(--shadow-card) !important;
        transition: box-shadow 0.3s ease, transform 0.3s ease, border-color 0.3s ease !important;
        position: relative;
      }
      .qb-collapsible-details::before {
        content: ""; position: absolute; left: 0; top: 18px; bottom: 18px; width: 4px;
        border-radius: 0 4px 4px 0; background: var(--accent);
        opacity: 0; transition: opacity 0.3s ease;
      }
      .qb-collapsible-details:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-hover) !important; }
      .qb-collapsible-details:hover::before, .qb-collapsible-details[open]::before { opacity: 1; }
      .qb-collapsible-details[open] {
        border-color: rgba(14, 15, 18, 0.09) !important;
        box-shadow: var(--shadow-card-hover) !important;
      }
      .qb-collapsible-details.is-opening {
        border-color: color-mix(in srgb, var(--accent) 35%, transparent) !important;
        box-shadow: 0 18px 44px color-mix(in srgb, var(--accent) 12%, transparent) !important;
      }

      .qb-collapsible-trigger { padding: 20px 24px !important; }
      .qb-collapsible-trigger:hover { background: color-mix(in srgb, var(--accent) 3%, #fff) !important; }
      .qb-collapsible-details[open] > .qb-collapsible-trigger {
        background: color-mix(in srgb, var(--accent) 4%, #fff) !important;
        border-bottom-color: rgba(14, 15, 18, 0.06) !important;
      }

      .qb-collapsible-title { display: inline-flex; align-items: baseline; gap: 12px; font-size: 0.98rem !important; }
      .qb-collapsible-title::before {
        counter-increment: qbsec;
        content: counter(qbsec, decimal-leading-zero);
        font-size: 0.72rem; font-weight: 900; color: var(--accent);
        letter-spacing: 0.06em;
      }

      .qb-collapsible-chevron {
        border-color: rgba(14, 15, 18, 0.1) !important;
        background: #fff !important;
      }
      .qb-collapsible-details[open] .qb-collapsible-chevron {
        background: var(--accent) !important; border-color: var(--accent) !important;
      }
      .qb-collapsible-details[open] .qb-collapsible-chevron::before,
      .qb-collapsible-details[open] .qb-collapsible-chevron::after { background: var(--accent-ink, #fff) !important; }

      .qb-collapsible-panel-inner { padding: 24px !important; }

      /* interactive hint pill → team accent */
      .qb-interactive-hint {
        border-color: color-mix(in srgb, var(--accent) 26%, #fff) !important;
        background: color-mix(in srgb, var(--accent) 8%, #fff) !important;
        color: var(--accent) !important;
      }

      /* modal polish */
      .qb-modal-backdrop { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
      .qb-modal { border-radius: 20px !important; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.35) !important; }

      /* tabs & pills pick up team accent where renderers used fixed blues */
      .qb-compare-tab[aria-pressed="true"], .qb-compare-tab.is-active {
        background: var(--accent) !important; border-color: var(--accent) !important;
        color: var(--accent-ink, #fff) !important;
      }

      /* ---------- switcher / cover overlay ---------- */
      .switcher {
        position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column;
        background:
          radial-gradient(1100px 500px at 85% -10%, color-mix(in srgb, var(--team) 36%, transparent), transparent 60%),
          radial-gradient(800px 500px at 0% 100%, color-mix(in srgb, var(--team) 22%, transparent), transparent 65%),
          #0b0c10;
        color: #fff; overflow-y: auto;
        opacity: 1; transition: opacity 0.35s ease;
      }
      .switcher[hidden] { display: none; }
      .switcher.is-leaving { opacity: 0; pointer-events: none; }

      .switcher-head {
        max-width: 1180px; width: 100%; margin: 0 auto;
        padding: clamp(26px, 6vh, 64px) clamp(18px, 4vw, 40px) 8px;
        text-align: center;
      }
      .switcher-logo {
        height: clamp(34px, 5vw, 50px); width: auto; display: block;
        margin: 0 auto 22px;
        filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.4));
      }
      .switcher-eyebrow {
        font-size: 0.74rem; font-weight: 800; letter-spacing: 0.34em; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55); margin: 0 0 14px;
      }
      .switcher-title {
        margin: 0; font-size: clamp(2.2rem, 6vw, 4.6rem); font-weight: 900;
        letter-spacing: -0.03em; line-height: 0.98; text-transform: uppercase;
      }
      .switcher-title .accent {
        background: linear-gradient(90deg, #fff, color-mix(in srgb, var(--team) 40%, #fff));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .switcher-sub {
        margin: 16px auto 0; max-width: 560px; font-size: 0.95rem; font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
      }

      .switcher-search-wrap {
        position: sticky; top: 0; z-index: 5;
        padding: 18px clamp(18px, 4vw, 40px);
        background: linear-gradient(#0b0c10ee, #0b0c10cc 70%, transparent);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      }
      .switcher-search {
        display: block; width: 100%; max-width: 520px; margin: 0 auto;
        height: 52px; padding: 0 22px; border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.07); color: #fff;
        font-family: inherit; font-size: 1rem; font-weight: 600;
        outline: none; transition: all 0.25s ease;
      }
      .switcher-search::placeholder { color: rgba(255, 255, 255, 0.4); }
      .switcher-search:focus {
        border-color: color-mix(in srgb, var(--team) 70%, #fff);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--team) 30%, transparent);
      }

      .switcher-grid {
        max-width: 1180px; width: 100%; margin: 0 auto;
        padding: 10px clamp(18px, 4vw, 40px) 80px;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 14px;
      }
      .qb-card {
        position: relative; border-radius: 18px; overflow: hidden; cursor: pointer;
        background: #14161b; border: 1px solid rgba(255, 255, 255, 0.07);
        font-family: inherit; padding: 0; text-align: left; color: #fff;
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }
      .qb-card:hover, .qb-card:focus-visible {
        transform: translateY(-4px);
        border-color: color-mix(in srgb, var(--card-team, #888) 80%, #fff);
        box-shadow: 0 22px 50px color-mix(in srgb, var(--card-team, #000) 35%, transparent);
        outline: none;
      }
      .qb-card-photo-wrap {
        position: relative; display: block; aspect-ratio: 1 / 0.92; overflow: hidden;
        background:
          radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--card-team, #555) 80%, #fff3), var(--card-team, #333) 75%);
      }
      .qb-card-watermark {
        position: absolute; left: 50%; top: 44%;
        width: 124%; height: auto;
        transform: translate(-50%, -50%) rotate(-6deg);
        opacity: 0.16; filter: saturate(1.3) brightness(1.15);
        pointer-events: none; user-select: none;
        transition: opacity 0.25s ease, transform 0.35s ease;
      }
      .qb-card:hover .qb-card-watermark {
        opacity: 0.24; transform: translate(-50%, -50%) rotate(-3deg) scale(1.05);
      }
      .qb-card-photo {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; object-position: top center; display: block;
      }
      .qb-card-body { padding: 12px 14px 14px; }
      .qb-card-name { margin: 0; font-size: 0.95rem; font-weight: 800; letter-spacing: -0.01em; }
      .qb-card-meta {
        margin: 6px 0 0; display: flex; align-items: center; justify-content: space-between; gap: 8px;
        font-size: 0.72rem; font-weight: 700; color: rgba(255, 255, 255, 0.55);
      }
      .qb-card-meta .tm { display: inline-flex; align-items: center; gap: 6px; }
      .qb-card-meta .tm::before {
        content: ""; width: 8px; height: 8px; border-radius: 50%;
        background: var(--card-team, #888); box-shadow: 0 0 8px var(--card-team, transparent);
      }
      .qb-card-grade {
        padding: 3px 8px; border-radius: 7px; font-weight: 900; font-size: 0.78rem;
        background: rgba(255, 255, 255, 0.1); color: #fff;
      }

      .switcher-close {
        position: fixed; top: 16px; right: 18px; z-index: 320;
        width: 44px; height: 44px; border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08); color: #fff;
        font-size: 1.3rem; font-weight: 700; cursor: pointer;
        transition: all 0.25s ease;
      }
      .switcher-close:hover { background: rgba(255, 255, 255, 0.18); transform: rotate(90deg); }

      .switcher-empty {
        grid-column: 1 / -1; text-align: center; padding: 60px 0;
        color: rgba(255, 255, 255, 0.45); font-weight: 700;

      /* ---------- loader ---------- */
      .loader {
        position: fixed; inset: 0; z-index: 400; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        background: #0b0c10; color: #fff;
        transition: opacity 0.4s ease;
      }
      .loader.is-done { opacity: 0; pointer-events: none; }
      .loader-mark {
        font-size: 1rem; font-weight: 900; letter-spacing: 0.34em; text-transform: uppercase;
        animation: loaderPulse 1.6s ease-in-out infinite;
      }
      .loader-bar {
        width: 180px; height: 3px; border-radius: 99px; overflow: hidden;
        background: rgba(255, 255, 255, 0.12); position: relative;
      }
      .loader-bar::after {
        content: ""; position: absolute; inset: 0; width: 40%;
        background: #fff; border-radius: 99px;
        animation: loaderSlide 1.1s ease-in-out infinite;
      }
      @keyframes loaderPulse { 50% { opacity: 0.55; } }
      @keyframes loaderSlide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(420%); }
      }

      /* ---------- profile swap transition ---------- */
      .content.is-swapping { opacity: 0; transform: translateY(14px); }
      .content { transition: opacity 0.28s ease, transform 0.28s ease; }

      /* ---------- responsive ---------- */
      @media (max-width: 920px) {
        .hero-stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .hero-grade-card { grid-column: 1 / -1; justify-content: center; }
        .hero-watermark { display: none; }
      }
      @media (max-width: 680px) {
        .hero-grid { flex-direction: column-reverse; align-items: flex-start; gap: 18px; }
        .hero-photo { width: 132px; height: 132px; }
        .hero-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .qb-switch-btn .hint-k, .qb-switch-btn .nm { display: none; }
        .qb-switch-btn { padding: 0 6px; }
        .qb-collapsible-panel-inner { padding: 16px !important; }
        .switcher-grid { grid-template-columns: repeat(auto-fill, minmax(136px, 1fr)); }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        .content, .qb-collapsible-details, .qb-card, .nav-arrow, .qb-switch-btn { transition: none !important; }
      }

      /* =========================================================
         COMPONENTS V2 — reimagined tables, tabs, pills & charts
         (overrides the renderer CSS injected above this block)
         ========================================================= */

      /* ----- data tables → floating row cards ----- */
      .qb-pass-table { border-spacing: 0 6px !important; }
      .qb-pass-table thead th {
        padding: 4px 14px 6px !important;
        border-bottom: 0 !important;
        font-size: 0.64rem !important; font-weight: 800 !important;

        color: #9aa1ab !important;
      }
      .qb-pass-table-row th,
      .qb-pass-table-row td {
        border-bottom: 0 !important;

        padding: 11px 14px !important;
        transition: background 0.18s ease;
      }
      .qb-pass-table-row th:first-child { border-radius: 12px 0 0 12px; }
      .qb-pass-table-row td:last-child { border-radius: 0 12px 12px 0; }
      .qb-pass-table-row:hover th,
      .qb-pass-table-row:hover td { background: color-mix(in srgb, var(--accent) 6%, #fff); }
      .qb-pass-table-label {

        box-shadow: inset 3px 0 0 color-mix(in srgb, var(--grade-color, #c6ccd4) 80%, #fff);
      }

      .qb-pass-table-row--rank-1 th,

      }
      .qb-pass-table-row--rank-1 .qb-pass-table-label { box-shadow: inset 3px 0 0 #f5c518; }
      .qb-pass-table-row--rank-top th,
      .qb-pass-table-row--rank-top td {
        background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 9%, #fff), #f7f8fa 65%) !important;
      }
      /* group headers → airy dividers, not bands */
      .qb-pass-table-group th {
        background: transparent !important;
        border: 0 !important;
        padding: 22px 14px 4px 0 !important;
        font-size: 0.7rem !important; letter-spacing: 0.16em !important;
        color: var(--accent) !important;
      }
      .qb-pass-table-group th::before {
        content: ""; display: inline-block; width: 14px; height: 3px;
        border-radius: 2px; background: var(--accent);
        margin-right: 8px; vertical-align: 3px;
      }

      /* ----- grade pills → solid chips ----- */
      .qb-pass-grade-pill {
        background: var(--grade-color, #9CA3AF) !important;
        border: 0 !important;
        color: #fff !important;
        box-shadow: 0 4px 10px color-mix(in srgb, var(--grade-color, #9CA3AF) 35%, transparent) !important;
        border-radius: 10px !important;
        min-width: 54px !important; padding: 6px 10px !important;
        font-size: 0.88rem !important;
      }

      /* ----- attempt & rank cells → slim baseline meters ----- */
      .qb-pass-table-att-wrap, .qb-pass-table-rank-wrap {
        padding: 4px 8px 10px !important; overflow: hidden;
      }
      .qb-pass-table-att-bar {
        inset: auto 0 0 0 !important; height: 5px !important;

      }
      .qb-pass-table-rank-bar {
        inset: auto 0 0 0 !important; height: 5px !important;
        border-radius: 99px !important;
        background: linear-gradient(90deg, var(--pass-accent, var(--accent)), #f5c518) !important;

      /* ----- tabs → segmented control ----- */
      .qb-compare-tabs, .qb-scatter-tabs, .qb-target-map-tabs {
        display: inline-flex !important; flex-wrap: wrap;
        gap: 3px !important; padding: 4px;
        border-radius: 14px; background: #edeff3;

      }

      /* ----- carousel track → flat, airy ----- */
      .qb-compare-track {
        border: 0 !important; background: transparent !important; box-shadow: none !important;
      }
      .qb-compare-slide { padding: 18px 4px 4px !important; }

      /* ----- split hero panes → gradient scoreboard ----- */
      .qb-compare-pane {
        border: 0 !important; border-radius: 18px !important;
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 7%, #fff), #f7f8fa) !important;
        padding: 18px 18px 16px !important;
      }
      .qb-compare-pane-grade { font-weight: 900 !important; }
      .qb-compare-hero-delta {
        background: #111418 !important; color: #fff !important;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      }
      .qb-compare-hero-delta.is-positive { background: #156a3c !important; color: #fff !important; }
      .qb-compare-hero-delta.is-negative { background: #9b1c1c !important; color: #fff !important; }

      /* ----- stat cards ----- */
      .qb-stat {
        border: 0 !important; border-radius: 16px !important;
        background: #f7f8fa !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(14, 15, 18, 0.08);
      }
      .qb-stat-value { font-weight: 900 !important; }

      /* ----- percentile meters (stable/unstable) ----- */

        height: 12px !important;
        background: #eceef2 !important;
        box-shadow: inset 0 1px 2px rgba(14, 15, 18, 0.06);
      }
      .qb-metric-fill {
        background: linear-gradient(90deg, color-mix(in srgb, var(--metric-color, var(--accent)) 70%, #fff), var(--metric-color, var(--accent))) !important;
        box-shadow: 0 0 10px color-mix(in srgb, var(--metric-color, var(--accent)) 40%, transparent);
      }

      /* ----- interception luck cards ----- */
      .qb-int-luck-card {
        border: 0 !important; border-radius: 16px !important;
        background: #f7f8fa !important;
      }

      /* ----- target map pills & filters ----- */
      .qb-target-map-pill {
        border: 0 !important; border-radius: 12px !important;
        background: #f7f8fa !important;
      }
      .qb-target-map-filter-trigger { border-radius: 12px !important; }

      /* ----- depth grid cells ----- */
      .qb-depth-cell { border-radius: 14px !important; transition: transform 0.18s ease, box-shadow 0.18s ease; }
      .qb-depth-cell:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(14, 15, 18, 0.1); }

      /* ----- compare tables inside splits ----- */
      .qb-compare-table td, .qb-compare-table th { border-bottom: 1px solid #eef0f3 !important; }
      .qb-compare-table tr:last-child td { border-bottom: 0 !important; }
      .qb-compare-table-val { font-weight: 800 !important; font-variant-numeric: tabular-nums; }

      /* ----- modal v2 — centered, cinematic ----- */
      .qb-modal-backdrop {
        background: rgba(8, 9, 12, 0.55) !important;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      }
      .qb-modal {
        border-radius: 24px !important;
        padding: 26px 26px 20px !important;
        box-shadow: 0 50px 120px rgba(0, 0, 0, 0.45) !important;
        border-top: 4px solid var(--accent);
        animation: qbModalIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes qbModalIn {
        from { transform: translateY(22px) scale(0.97); opacity: 0; }
        to { transform: none; opacity: 1; }
      }
      .qb-modal-close { border-radius: 50% !important; }

      /* ----- donut rows ----- */
      .qb-donut-year {
        font-size: 0.78rem !important; font-weight: 800 !important;
        letter-spacing: 0.12em; text-transform: uppercase; color: #6b7280;
      }

      /* ----- team logo accents ----- */
      .kicker-logo {
        width: 18px; height: 18px; object-fit: contain; display: inline-block;
        filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35));
      }
      .hero-logo-ghost {
        position: absolute; left: clamp(-40px, -3vw, -10px); bottom: -12%;
        width: clamp(220px, 30vw, 420px); height: auto; opacity: 0.09;
        pointer-events: none; user-select: none;
        filter: grayscale(0.15) brightness(1.6);
      }
      .hero-stat .lbl, .grade-meta .lbl { position: relative; }
      .qb-card-meta .tm img {
        width: 14px; height: 14px; object-fit: contain; display: inline-block;
      }
      .qb-card-meta .tm::before { display: none; }
      .switch-logo { width: 18px; height: 18px; object-fit: contain; flex: 0 0 18px; }
      @media (max-width: 680px) {
        .hero-logo-ghost { display: none; }
        .qb-switch-btn .switch-logo { display: none; }
      }

      /* =========================================================
         V3 — CHAPTERS: sections always open, editorial headers
         ========================================================= */
      .qb-section { margin: 0 0 34px !important; }
      .qb-collapsible-details { overflow: visible !important; }
      .qb-collapsible-details:hover { transform: none !important; }
      .qb-collapsible-details::before { opacity: 1 !important; top: 30px !important; height: 40px; bottom: auto !important; }
      .qb-collapsible-trigger {
        pointer-events: none; cursor: default !important;
        background: transparent !important;
        border-bottom: 0 !important;
        padding: 28px 28px 6px !important;
      }
      .qb-collapsible-details[open] > .qb-collapsible-trigger {
        background: transparent !important; border-bottom: 0 !important;
      }
      .qb-collapsible-chevron { display: none !important; }
      .qb-collapsible-title {
        font-size: clamp(1.15rem, 2.6vw, 1.55rem) !important;
        letter-spacing: 0.04em !important;
        gap: 16px !important; align-items: center !important;
      }
      .qb-collapsible-title::before {
        font-size: clamp(1.9rem, 4vw, 2.7rem);
        color: transparent;
        -webkit-text-stroke: 1.6px color-mix(in srgb, var(--accent) 60%, #fff);
        line-height: 0.85;
        font-weight: 900;
      }
      .qb-collapsible-panel-inner { padding: 18px 28px 30px !important; }
      @media (max-width: 680px) {
        .qb-collapsible-trigger { padding: 20px 16px 2px !important; }
        .qb-collapsible-panel-inner { padding: 12px 16px 20px !important; }
      }

      /* ----- annual segmented tabs + panes (merged sections, versus board) ----- */
      .annual-tabs {
        display: inline-flex; flex-wrap: wrap; gap: 3px;
        padding: 4px; border-radius: 14px; background: #edeff3;
        margin: 0 0 20px;
      }
      .annual-tab {
        border: 0; background: transparent; border-radius: 10px;
        padding: 9px 16px; font-family: inherit;
        font-size: 0.78rem; font-weight: 800; letter-spacing: 0.02em;
        color: #5b6470; cursor: pointer; transition: all 0.2s ease;
      }
      .annual-tab:hover { color: var(--accent); }
      .annual-tab[aria-pressed="true"] {
        background: var(--accent); color: var(--accent-ink, #fff);
        box-shadow: 0 4px 12px color-mix(in srgb, var(--accent) 35%, transparent);
      }
      .annual-pane { display: none; }
      .annual-pane.is-active { display: block; animation: paneIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) both; }
      @keyframes paneIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

      .annual-kicker {
        margin: 0 0 18px; font-size: 0.78rem; font-weight: 700; color: #8a8f98;
      }
      .annual-rank-chip {
        display: inline-flex; align-items: baseline; gap: 4px;
        padding: 4px 10px; border-radius: 999px;
        background: color-mix(in srgb, var(--accent) 10%, #fff);

      .annual-rank-chip.is-gold { background: rgba(245, 197, 24, 0.18); color: #9a7200; }

      /* ----- QB alignment → formation deck ----- */
      .align-deck {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 14px;
      }
      .align-card {
        position: relative; border-radius: 20px; padding: 22px 18px 18px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--ac, var(--accent)) 9%, #fff), #f7f8fa 70%);
        text-align: center;
        transition: transform 0.22s ease, box-shadow 0.22s ease;
      }
      .align-card:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(14, 15, 18, 0.1); }
      .align-ring { width: 112px; height: 112px; margin: 0 auto 12px; position: relative; }
      .align-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
      .align-ring .bg { stroke: rgba(14, 15, 18, 0.07); }
      .align-ring .fg { stroke: var(--ac, var(--accent)); stroke-linecap: round; transition: stroke-dasharray 1s cubic-bezier(0.22, 1, 0.36, 1); }
      .align-ring .pct {

        font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em;
      }
      .align-ring .pct small { font-size: 0.8rem; font-weight: 800; color: #9aa1ab; margin-left: 1px; }
      .align-card h4 {
        margin: 0 0 2px; font-size: 0.8rem; font-weight: 900;
        letter-spacing: 0.12em; text-transform: uppercase;
      }
      .align-card .cnt { margin: 0 0 10px; font-size: 0.76rem; font-weight: 700; color: #8a8f98; }

      /* ----- passing splits → versus board ----- */
      .vs-kicker { margin: 0 0 14px; font-size: 0.8rem; font-weight: 700; color: #8a8f98; }
      .vs-hero {
        display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 14px; align-items: stretch; margin-bottom: 22px;
      }
      .vs-pane {
        border-radius: 20px; padding: 20px 20px 16px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, #fff), #f7f8fa);
        display: flex; flex-direction: column; gap: 4px;
      }
      .vs-pane.is-right { text-align: right; align-items: flex-end; }
      .vs-pane.is-win { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 45%, #fff); }
      .vs-pane .lbl {
        font-size: 0.66rem; font-weight: 800; letter-spacing: 0.1em;
        text-transform: uppercase; color: #8a8f98;
      }
      .vs-pane .grade {
        font-size: clamp(2.1rem, 5vw, 3rem); font-weight: 900;
        letter-spacing: -0.04em; line-height: 1;
      }
      .vs-pane .meta { font-size: 0.74rem; font-weight: 700; color: #8a8f98; }
      .vs-mid {
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      }
      .vs-mid .vs {
        font-size: 0.64rem; font-weight: 900; letter-spacing: 0.18em; color: #c3c8cf;
      }
      .vs-delta {
        padding: 6px 12px; border-radius: 999px;
        font-size: 0.84rem; font-weight: 900; font-variant-numeric: tabular-nums;

        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      }
      .vs-delta.is-pos { background: #156a3c; }
      .vs-delta.is-neg { background: #9b1c1c; }

      .vs-bars { display: flex; flex-direction: column; gap: 10px; }
      .vs-bar-row {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr) minmax(86px, auto) minmax(0, 1fr) 52px;
        gap: 10px; align-items: center;
      }
      .vs-bar-label {
        text-align: center; font-size: 0.68rem; font-weight: 800;
        letter-spacing: 0.08em; text-transform: uppercase; color: #6b7280;
        white-space: nowrap;
      }
      .vs-val { font-size: 0.84rem; font-weight: 800; font-variant-numeric: tabular-nums; color: #9aa1ab; }
      .vs-val.is-win { color: var(--accent); }
      .vs-val:first-child { text-align: right; }
      .vs-bar { height: 10px; border-radius: 99px; background: #eceef2; overflow: hidden; position: relative; }
      .vs-bar i {
        position: absolute; top: 0; bottom: 0; display: block;

        transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .vs-bar.is-left i { right: 0; }
      .vs-bar.is-right i { left: 0; }
      .vs-bar i.is-win { background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 65%, #fff), var(--accent)); }

      /* ----- allowed pressures → protection map ----- */
      .prot-summary {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px; margin-bottom: 24px;
      }
      .prot-chip {
        border-radius: 14px; background: #f7f8fa; padding: 12px 14px; text-align: center;
      }
      .prot-chip .v { display: block; font-size: 1.35rem; font-weight: 900; letter-spacing: -0.02em; }
      .prot-chip .l {
        display: block; margin-top: 3px; font-size: 0.62rem; font-weight: 800;
        letter-spacing: 0.1em; text-transform: uppercase; color: #8a8f98;
      }
      .prot-field {
        border-radius: 22px; padding: 26px 18px 22px;
        background:
          repeating-linear-gradient(0deg, transparent 0 44px, rgba(255, 255, 255, 0.05) 44px 46px),
          linear-gradient(180deg, #14331f, #0d2415);
        color: #fff;
      }
      .prot-field-title {
        margin: 0 0 20px; text-align: center;
        font-size: 0.66rem; font-weight: 800; letter-spacing: 0.22em;
        text-transform: uppercase; color: rgba(255, 255, 255, 0.55);
      }
      .prot-line {
        display: flex; justify-content: center; align-items: flex-end;

      }
      .prot-node { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 64px; }

        width: var(--sz, 60px); height: var(--sz, 60px); border-radius: 50%;

        background: radial-gradient(circle at 32% 28%, color-mix(in srgb, var(--pc, #64748b) 70%, #fff), var(--pc, #64748b));
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35), inset 0 -3px 8px rgba(0, 0, 0, 0.25);
        font-weight: 900; font-size: 1.05rem; color: #fff;
        transition: transform 0.2s ease;
      }
      .prot-node:hover .prot-bubble { transform: translateY(-4px) scale(1.04); }
      .prot-node .pos {
        font-size: 0.66rem; font-weight: 900; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
      }
      .prot-node .shr { font-size: 0.72rem; font-weight: 800; color: rgba(255, 255, 255, 0.55); }
      .prot-node .annual-rank-chip { background: rgba(255, 255, 255, 0.12); color: #fff; }
      .prot-node .annual-rank-chip small { color: rgba(255, 255, 255, 0.5); }
      .prot-node .annual-rank-chip.is-gold { background: rgba(245, 197, 24, 0.25); color: #f5c518; }
      .prot-qb-row { display: flex; justify-content: center; gap: clamp(16px, 4vw, 44px); margin-top: 24px; }

      /* ----- clutch moments → primetime board ----- */
      .clutch-board {
        position: relative; overflow: hidden;
        border-radius: 26px; padding: clamp(22px, 3.4vw, 36px);
        color: #fff;
        background:

          return [parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16)];
        }
        function rgbToHex(r, g, b) {
          return "#" + [r, g, b].map((n) => Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, "0")).join("");
        }
        function mix(hexA, hexB, t) {
          const a = hexToRgb(hexA), b = hexToRgb(hexB);
          return rgbToHex(a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t);
        }
        function luminance(hex) {
          const [r, g, b] = hexToRgb(hex).map((v) => {
            const s = v / 255;
            return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
          });
          return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }
        function buildTheme(primary) {
          let accent = primary;
          // darken very light team colors (Steelers gold, Saints) until usable on white
          let guard = 0;
          while (luminance(accent) > 0.32 && guard < 24) { accent = mix(accent, "#000000", 0.12); guard++; }
          const lum = luminance(primary);
          return {
            team: primary,
            teamDeep: mix(primary, "#000000", lum > 0.5 ? 0.55 : 0.45),
            accent,
            heroFg: lum > 0.45 ? "#101114" : "#ffffff",
            accentInk: luminance(accent) > 0.45 ? "#101114" : "#ffffff",
          };
        }
        function applyTheme(primary) {
          const t = buildTheme(primary);
          const r = document.documentElement.style;
          r.setProperty("--team", t.team);
          r.setProperty("--team-deep", t.teamDeep);
          r.setProperty("--accent", t.accent);
          r.setProperty("--accent-ink", t.accentInk);
          r.setProperty("--hero-fg", t.heroFg);
          return t;
        }

        function headshotUrl(playerId) {
          return "https://media.pff.com/player-photos/nfl/" + encodeURIComponent(playerId) + ".webp";
        }

        /* ---------------- persistence / deep links ---------------- */
        function readHash() {
          const m = {};
          location.hash.replace(/^#/, "").split("&").forEach((kv) => {
            const [k, v] = kv.split("=");
            if (k && v) m[decodeURIComponent(k)] = decodeURIComponent(v);
          });
          return m;
        }
        function writeHash() {
          if (!current) return;
          const next = "#qb=" + encodeURIComponent(current.playerId) + "&season=" + season;
          if (location.hash === next) return;
          try { history.replaceState(null, "", next); }
          catch (_) { try { location.hash = next; } catch (_) { /* ignore */ } }
        }
        function persist() {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ playerId: current?.playerId || "", season }));
          } catch (_) { /* ignore */ }
        }
        function restore() {
          try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (_) { return {}; }
        }

        /* ---------------- data loading ---------------- */
        async function loadAllData() {
          const empty = {
            passingSummaryText: "", gameGradeFeedText: "", gradeDistributionFeedText: "",
            opponentsFeedText: "", gradingProfileFeedText: "", stableUnstableFeedText: "",
            passingPressureFeedText: "", passingConceptFeedText: "", timeInPocketFeedText: "",
            intLuckFeedText: "", passingDepthFeedText: "", accuracyByDepthFeedText: "",
            generalAccuracyFeedText: "", qbAccuracyFeedText: "", incompletionRatesFeedText: "",
            qbAlignmentFeedText: "", allowedPressureFeedText: "", clutchFeedText: "",
            routeDataFeedText: "", epaSeasonFeedText: "", epaCareerFeedText: "",
            warSeasonFeedText: "", rushingSummaryFeedText: "",
            passingGradesSituationFeedText: "", passingGradesReadsFeedText: "",
            passingGradesCoverageFeedText: "", targetAlignmentFeedText: "", throwTypeFeedText: "",
          };
          const [mainResult, targetMapResult, routeDataResult] = await Promise.allSettled([
            window.QbAnnualApi.ensureAllDataLoaded(empty),
            window.QbAnnualTargetMapApi.ensureTargetMapLoaded(""),
            window.QbAnnualRouteTreeApi.ensureRouteDataLoaded(""),
          ]);
          lastLoadErrors = [];
          if (mainResult.status === "rejected") lastLoadErrors.push("profile feeds: " + (mainResult.reason?.message || "load failed"));
          else if (mainResult.value?.errors?.length) lastLoadErrors.push(...mainResult.value.errors);
          if (targetMapResult.status === "rejected") lastLoadErrors.push("target map: load failed");
          if (routeDataResult.status === "rejected") lastLoadErrors.push("route data: load failed");
        }

        function buildQbOrder() {
          const passing = window.QbAnnualApi.getPassingSummaryState();
          const qbs = passing?.qbs || [];
          const grades = {};
          const ranks = {};
          (passing?.rows || []).forEach((row) => {
            if (String(row.season) !== "2025") return;
            const key = row.playerId || row.player;
            if (key != null && row.gradesPass != null) grades[key] = row.gradesPass;
          });
          const pool = (passing?.rankPools || {})["2025"] || [];
          pool.forEach((row, i) => { ranks[row.playerId || row.player] = { rank: i + 1, total: pool.length }; });

          qbOrder = qbs
            .map((q) => ({
              ...q,
              grade: grades[q.playerId] ?? grades[q.playerName] ?? null,
              rank: ranks[q.playerId]?.rank ?? null,
              rankTotal: ranks[q.playerId]?.total ?? null,
            }))
            // home grid & navigation: only QBs in the 2025 rank pool (Included in rank? = 1)
            .filter((q) => q.rank != null)
            .sort((a, b) => a.rank - b.rank);
        }

        /* ---------------- profile build + render ---------------- */
        function buildProfileFor(qb) {
          const Api = window.QbAnnualApi;
          const state = {
            playerId: qb.playerId, playerName: qb.playerName,
            franchiseId: qb.franchiseId,
            team: window.QbAnnualTeams.resolve(qb.franchiseId).nickname || qb.teamName || "",
            displaySeason: season, gameGradeSeason: "2025",
          };
          const profile = Api.buildProfile(
            state,
            Api.getPassingSummaryState(), Api.getGameGradeFeedState(), Api.getGradeDistributionState(),
            Api.getOpponentsState(), Api.getGradingProfileState(), Api.getStableUnstableState(),
            Api.getPassingPressureState(), Api.getPassingConceptState(), Api.getTimeInPocketState(),
            Api.getIntLuckState(), Api.getPassingDepthState(), Api.getEpaPerPlayState(),
            Api.getAccuracyByDepthState(), Api.getGeneralAccuracyState(), Api.getWarSeasonState(),
            Api.getRushingSummaryState(), Api.getPassingGradesSituationState(), Api.getPassingGradesReadsState(),
            Api.getPassingGradesCoverageState(), Api.getTargetAlignmentState(), Api.getThrowTypeState(),
            Api.getQbAccuracyState(), Api.getIncompletionRatesState(), Api.getQbAlignmentState(),
            Api.getAllowedPressureState(), Api.getClutchState()
          );

          const tmState = window.QbAnnualTargetMapApi.getTargetMapState();
          const plays = window.QbAnnualTargetMapApi.getTargetMapPlaysForPasser(tmState, profile.playerId, profile.playerName);
          profile.targetMap = window.QbAnnualTargetMapApi.buildTargetMapModel(plays, profile);
          if (!profile.targetMap) profile.errors.push("No target map data for this QB.");

          const rtState = window.QbAnnualRouteTreeApi.getRouteDataState();
          profile.routeTree = window.QbAnnualRouteTreeApi.getRouteTreeForPlayer(rtState, profile.playerId, profile.playerName);
          if (!profile.routeTree) profile.errors.push("No route tree data for this QB.");

          return profile;
        }

        /* ---------------- section customization (chapters, merges, rebuilds) ---------------- */
        function safe(fn, label) {
          try { fn(); } catch (err) { console.error("[QB Annual] " + label + " failed:", err); }
        }
        function ordinal(n) {
          if (n == null) return "—";
          const s = ["th", "st", "nd", "rd"], v = n % 100;
          return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }
        function rankChip(row) {
          if (row?.rank == null) return `<span class="annual-rank-chip"><small>—</small></span>`;
          const gold = row.rank === 1 ? " is-gold" : "";
          return `<span class="annual-rank-chip${gold}">${escapeHtml(ordinal(row.rank))} <small>of ${escapeHtml(String(row.rankTotal ?? "—"))}</small></span>`;
        }
        function ringSvg(pct, sizeClass, color, label) {
          const C = 2 * Math.PI * 32;
          const dash = (C * Math.max(0, Math.min(1, pct))).toFixed(1);
          return `<div class="${sizeClass}" style="--cc:${escapeAttr(color)}">
            <svg viewBox="0 0 74 74">
              <circle class="bg" cx="37" cy="37" r="32" fill="none" stroke-width="7"></circle>
              <circle class="fg" cx="37" cy="37" r="32" fill="none" stroke-width="7" stroke="${escapeAttr(color)}"
                stroke-dasharray="0 ${C.toFixed(1)}" data-ring-dash="${dash}" data-ring-circ="${C.toFixed(1)}"></circle>
            </svg>
            <span class="${sizeClass === "align-ring" ? "pct" : "val"}">${label}</span>
          </div>`;
        }
        function armRings(scope) {
          requestAnimationFrame(() => requestAnimationFrame(() => {
            const root = scope || els.mount;
            root.querySelectorAll("[data-ring-dash]").forEach((fg) => {
              const d = parseFloat(fg.dataset.ringDash), c = parseFloat(fg.dataset.ringCirc);
              fg.setAttribute("stroke-dasharray", d + " " + (c - d));
            });
            root.querySelectorAll("[data-bar-w]").forEach((el) => {
              el.style.width = parseFloat(el.dataset.barW || "0") + "%";
            });
          }));
        }
        function findSectionByTitle(title) {
          return [...els.mount.querySelectorAll(".qb-section")].find((sec) => {
            const t = sec.querySelector(".qb-collapsible-title");
            return t && t.textContent.trim().toLowerCase() === title.toLowerCase();
          }) || null;
        }
        function panelInnerOf(sec) {
          return sec?.querySelector(".qb-collapsible-panel-inner") || null;
        }
        function chapterShell(title, bodyHtml) {
          return `<section class="qb-section qb-collapsible qb-animate-section">
  <details class="qb-collapsible-details" open>
    <summary class="qb-collapsible-trigger">
      <span class="qb-collapsible-heading"><span class="qb-collapsible-title">${escapeHtml(title)}</span></span>
      <span class="qb-collapsible-chevron" aria-hidden="true"></span>
    </summary>
    <div class="qb-collapsible-panel"><div class="qb-collapsible-panel-inner">${bodyHtml}</div></div>
  </details>
</section>`;
        }
        function annualTabsHtml(labels) {
          return `<div class="annual-tabs" role="tablist">${labels
            .map((l, i) => `<button type="button" class="annual-tab" data-annual-tab="${i}" aria-pressed="${i === 0 ? "true" : "false"}">${escapeHtml(l)}</button>`)
            .join("")}</div>`;
        }

        function mergeSeasonDonutSections() {
          const defs = [
            { attr: "data-ttt-season", label: "Time to throw" },
            { attr: "data-adot-season", label: "Target depth" },
            { attr: "data-pts-season", label: "Pressure to sack" },
          ];
          const found = defs
            .map((d) => ({ ...d, sec: els.mount.querySelector(`[${d.attr}]`)?.closest(".qb-section") }))
            .filter((d) => d.sec);
          if (found.length < 2) return;

          const wrapper = document.createElement("div");
          wrapper.innerHTML = chapterShell("Timing & pressure trends", annualTabsHtml(found.map((d) => d.label)) + `<div class="annual-panes"></div>`);
          const merged = wrapper.firstElementChild;
          const panes = merged.querySelector(".annual-panes");

          found.forEach((d, i) => {
            const pane = document.createElement("div");
            pane.className = "annual-pane" + (i === 0 ? " is-active" : "");
            const inner = panelInnerOf(d.sec);
            while (inner && inner.firstChild) pane.appendChild(inner.firstChild);
            panes.appendChild(pane);
          });

          found[0].sec.parentNode.insertBefore(merged, found[0].sec);
          found.forEach((d) => d.sec.remove());
        }

        const FMT = {
          pct: (v) => (v == null || !Number.isFinite(v) ? "—" : v.toFixed(1) + "%"),
          decimal: (v) => (v == null || !Number.isFinite(v) ? "—" : v.toFixed(1)),
          grade: (v) => (v == null || !Number.isFinite(v) ? "—" : Number(v).toFixed(1)),
        };
        function gradeColor(v) {
          try { return window.QbAnnualProfile.gradeColorFor(v) || "#374151"; } catch (_) { return "#374151"; }
        }

        function rebuildQbAlignment(profile, theme) {
          const sec = els.mount.querySelector(".qb-section-qb-align") || findSectionByTitle("QB alignment");
          const inner = panelInnerOf(sec);
          const rows = profile.qbAlignment?.rows || [];
          if (!inner || !rows.length) return;
          const palette = { shotgun: theme.accent, pistol: mix(theme.accent, "#000000", 0.32), "under-center": "#64748b" };
          const cards = rows.map((row) => {
            const color = palette[row.id] || theme.accent;
            return `<div class="align-card qb-animate-item" style="--ac:${escapeAttr(color)}">
              ${ringSvg((row.share || 0) / 100, "align-ring", color, `${escapeHtml((row.share ?? 0).toFixed(0))}<small>%</small>`)}
              <h4>${escapeHtml(row.label)}</h4>
              <p class="cnt">${escapeHtml(Math.round(row.count || 0).toLocaleString("en-US"))} dropbacks</p>
              ${rankChip(row)}
            </div>`;
          }).join("");
          const total = profile.qbAlignment.totalDropbacks;
          inner.innerHTML = `
            <p class="annual-kicker">Dropback alignment mix${total != null ? " · " + Math.round(total).toLocaleString("en-US") + " total dropbacks" : ""} · share ranks vs qualifying QBs</p>
            <div class="align-deck">${cards}</div>`;
        }

        function rebuildPassingSplits(profile) {
          const sec = findSectionByTitle("Passing splits");
          const inner = panelInnerOf(sec);
          const splits = profile.passingPressure?.splits || [];
          if (!inner || !splits.length) return;

          const panes = splits.map((split, idx) => {
            const leftWin = split.gradeDelta != null && split.gradeDelta > 0;
            const rightWin = split.gradeDelta != null && split.gradeDelta < 0;
            const deltaCls = leftWin || rightWin ? (split.gradeDelta > 0 ? " is-pos" : " is-neg") : "";
            const deltaTxt = split.gradeDelta == null ? "—"
              : (split.gradeDelta > 0 ? "+" : "") + split.gradeDelta.toFixed(1);
            const share = split.rightShare != null
              ? `${Math.round(split.rightShare)}% of dropbacks came ${escapeHtml(split.rightLabel.toLowerCase())}` : "";

            const bars = (split.highlights || []).map((m) => {
              const l = m.left, r = m.right;
              const max = Math.max(Math.abs(l ?? 0), Math.abs(r ?? 0)) || 1;
              const lw = l != null ? (Math.abs(l) / max) * 100 : 0;
              const rw = r != null ? (Math.abs(r) / max) * 100 : 0;
              let lWin = false, rWin = false;
              if (l != null && r != null && l !== r) {
                lWin = m.higherBetter ? l > r : l < r;
                rWin = !lWin;
              }
              return `<div class="vs-bar-row qb-animate-item">
                <span class="vs-val${lWin ? " is-win" : ""}">${FMT[m.format] ? FMT[m.format](l) : l}</span>
                <div class="vs-bar is-left"><i class="${lWin ? "is-win" : ""}" style="width:${lw.toFixed(1)}%"></i></div>
                <span class="vs-bar-label">${escapeHtml(m.label)}</span>
                <div class="vs-bar is-right"><i class="${rWin ? "is-win" : ""}" style="width:${rw.toFixed(1)}%"></i></div>
                <span class="vs-val${rWin ? " is-win" : ""}">${FMT[m.format] ? FMT[m.format](r) : r}</span>
              </div>`;
            }).join("");

            return `<div class="annual-pane${idx === 0 ? " is-active" : ""}">
              ${share ? `<p class="vs-kicker">${share}</p>` : ""}
              <div class="vs-hero qb-animate-item">
                <div class="vs-pane${leftWin ? " is-win" : ""}">
                  <span class="lbl">${escapeHtml(split.leftLabel)}</span>
                  <span class="grade" style="color:${escapeAttr(gradeColor(split.leftGrade))}">${FMT.grade(split.leftGrade)}</span>
                  <span class="meta">${split.leftDropbacks != null ? Math.round(split.leftDropbacks).toLocaleString("en-US") + " dropbacks" : "—"}</span>
                </div>
                <div class="vs-mid"><span class="vs">VS</span><span class="vs-delta${deltaCls}">${escapeHtml(deltaTxt)}</span></div>
                <div class="vs-pane is-right${rightWin ? " is-win" : ""}">
                  <span class="lbl">${escapeHtml(split.rightLabel)}</span>
                  <span class="grade" style="color:${escapeAttr(gradeColor(split.rightGrade))}">${FMT.grade(split.rightGrade)}</span>
                  <span class="meta">${split.rightDropbacks != null ? Math.round(split.rightDropbacks).toLocaleString("en-US") + " dropbacks" : "—"}</span>
                </div>
              </div>
              <div class="vs-bars">${bars}</div>
            </div>`;
          }).join("");

          inner.innerHTML =
            annualTabsHtml(splits.map((s) => s.shortTitle || s.title)) +
            `<div class="annual-panes">${panes}</div>`;
        }

        const PROT_LAYOUT = [
          { id: "lt", pos: "LT" }, { id: "lg", pos: "LG" }, { id: "ce", pos: "C" },
          { id: "rg", pos: "RG" }, { id: "rt", pos: "RT" }, { id: "te", pos: "TE" },
        ];
        const PROT_COLORS = {
          ce: null, lg: "#475569", lt: "#64748B", rg: "#334155", rt: "#1E293B",
          te: "#D97706", self: "#DC2626", other: "#9CA3AF",
        };
        function protNode(row, theme) {
          if (!row) return "";
          const color = PROT_COLORS[row.id] === null ? theme.accent : (PROT_COLORS[row.id] || "#64748b");
          const share = row.share || 0;
          const size = Math.round(Math.max(52, Math.min(110, 52 + share * 1.5)));
          return `<div class="prot-node qb-animate-item" style="--pc:${escapeAttr(color)}; --sz:${size}px">
            <div class="prot-bubble">${escapeHtml(String(Math.round(row.count || 0)))}</div>
            <span class="pos">${escapeHtml(row.pos || row.label)}</span>
            <span class="shr">${escapeHtml(row.displayShare || "—")}</span>
            ${rankChip(row)}
          </div>`;
        }
        function rebuildAllowedPressures(profile, theme) {
          const sec = els.mount.querySelector(".qb-section-allowed-pressure") || findSectionByTitle("Allowed pressures");
          const inner = panelInnerOf(sec);
          const ap = profile.allowedPressures;
          const rows = ap?.rows || [];
          if (!inner || !rows.length) return;
          const byId = {};
          rows.forEach((r) => { byId[r.id] = r; });

          const summary = [
            [ap.pressuresAllowed, "Pressures allowed"],
            [ap.allowedPressureDropbacks, "Pressure dropbacks"],
            [ap.hitsAllowed, "Hits"],
            [ap.hurriesAllowed, "Hurries"],
            [ap.sacksAllowed, "Sacks"],
          ].filter(([v]) => v != null && Number.isFinite(v))
            .map(([v, l]) => `<div class="prot-chip qb-animate-item"><span class="v">${escapeHtml(Math.round(v).toLocaleString("en-US"))}</span><span class="l">${escapeHtml(l)}</span></div>`)
            .join("");

          const line = PROT_LAYOUT.map((p) => protNode(byId[p.id] ? { ...byId[p.id], pos: p.pos } : null, theme)).join("");
          const backfield = [
            byId.self ? protNode({ ...byId.self, pos: "QB fault" }, theme) : "",
            byId.other ? protNode({ ...byId.other, pos: "Other" }, theme) : "",
          ].join("");

          inner.innerHTML = `
            <p class="annual-kicker">Who allowed the pressure · share ranks vs qualifying QBs (lower QB-fault share ranks higher)</p>
            ${summary ? `<div class="prot-summary">${summary}</div>` : ""}
            <div class="prot-field qb-animate-item">
              <p class="prot-field-title">Pressure sources · line of scrimmage</p>
              <div class="prot-line">${line}</div>
              <div class="prot-qb-row">${backfield}</div>
            </div>`;
        }

        function rebuildClutch(profile, theme) {
          const sec = els.mount.querySelector(".qb-section-clutch") || findSectionByTitle("Clutch moments");
          const inner = panelInnerOf(sec);
          const cm = profile.clutchMoments;
          const rows = cm?.rows || [];
          if (!inner || !rows.length) return;

          const pctOf = (row) => row.rank != null && row.rankTotal
            ? ((row.rankTotal - row.rank + 1) / row.rankTotal) * 100 : null;

          // signature stat: the best-ranked clutch metric
          const ranked = rows.filter((r) => r.rank != null);
          let signature = "";
          if (ranked.length) {
            const best = [...ranked].sort((a, b) => a.rank - b.rank)[0];
            if (best.rank <= 10) {
              signature = `<div class="clutch-signature qb-animate-item">${escapeHtml(
                best.rank === 1
                  ? "League's best " + best.label + " in clutch time"
                  : ordinal(best.rank) + " in the NFL · " + best.label + " in clutch time"
              )}</div>`;
            }
          }

          const metrics = rows.map((row) => {
            const pct = pctOf(row);
            const display = row.displayValue != null && row.displayValue !== ""
              ? String(row.displayValue)
              : row.format === "grade" ? FMT.grade(row.value) : String(row.value ?? "—");
            const cls = row.rank === 1 ? " is-rank1" : pct == null ? " is-unranked" : "";
            return `<div class="clutch-metric qb-animate-item${cls}">
              <span class="cm-lbl">${escapeHtml(row.label)}</span>
              <span class="cm-track"><i data-bar-w="${pct != null ? pct.toFixed(1) : 0}"></i></span>
              <span class="cm-val">${escapeHtml(display)}</span>
              ${rankChip(row)}
            </div>`;
          }).join("");

          inner.innerHTML = `<div class="clutch-board qb-animate-item">
            <div class="clutch-top">
              <div>
                <p class="clutch-eyebrow">High leverage · ${escapeHtml(season)}</p>
                <h4 class="clutch-title">Clutch time</h4>
                <p class="clutch-sub">Crunch-time passing · bars show league percentile vs qualifying QBs${cm.includedInRank ? "" : " · not included in rank pool"}</p>
              </div>
              ${cm.dropbacks != null ? `<div class="clutch-clock"><span class="digits">${escapeHtml(Math.round(cm.dropbacks).toLocaleString("en-US"))}</span><span class="unit">clutch dropbacks</span></div>` : ""}
            </div>
            ${signature}
            <div class="clutch-spine">${metrics}</div>
            <div class="clutch-axis"><span>Bottom of league</span><span>League best</span></div>
          </div>`;
        }

        function accColor(row) {
          try { return window.QbAnnualProfile.accuracyValueColor(row) || "#374151"; } catch (_) { return "#374151"; }
        }
        const ACC_RING_COLORS = { acc: null, catchable: "#E8A020", uncatchable: "#D04040", other: "#9CA3AF" };
        function classifyAccRow(label) {
          const l = (label || "").toLowerCase();
          if (l.includes("plus")) return "plus";
          if (l.includes("uncatchable")) return "uncatchable";
          if (l.includes("catchable")) return "catchable";
          if (l.startsWith("acc") || l.includes("accurate")) return "acc";
          return "other";
        }
        function receiverSvg(theme, vals) {
          const rings = [
            { r: 50, color: theme.accent, w: 10, dash: "", op: 0.92, val: vals.acc },
            { r: 90, color: "#E8A020", w: 8, dash: "", op: 0.78, val: vals.catchable },
            { r: 128, color: "#D04040", w: 6, dash: "4 7", op: 0.62, val: vals.uncatchable },
          ];
          const ringEls = rings.map((g) => g.val == null ? "" : `
            <circle cx="160" cy="128" r="${g.r}" fill="none" stroke="${escapeAttr(g.color)}" stroke-width="${g.w}"
              opacity="${g.op}"${g.dash ? ` stroke-dasharray="${g.dash}"` : ""} stroke-linecap="round"/>`).join("");
          const labelEls = rings.map((g) => {
            if (g.val == null) return "";
            const x = 160 + g.r * 0.62, y = 128 - g.r * 0.79;
            return `<text x="${x.toFixed(0)}" y="${y.toFixed(0)}" font-family="Archivo, sans-serif" font-size="15" font-weight="900"
              fill="${escapeAttr(g.color)}" paint-order="stroke" stroke="#f7f8fa" stroke-width="5" stroke-linejoin="round">${escapeHtml(g.val)}</text>`;
          }).join("");
          return `<svg viewBox="0 0 320 290" role="img" aria-label="Ball placement around the receiver">
            ${ringEls}
            <g stroke="#14161b" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none">
              <path d="M160,82 L157,150"/>
              <path d="M159,92 L128,118 L113,150"/>
              <path d="M159,90 L192,66 L211,42"/>
              <path d="M157,150 L135,196 L120,242"/>
              <path d="M157,150 L184,192 L177,244"/>
            </g>
            <circle cx="160" cy="58" r="15" fill="#14161b"/>
            <ellipse cx="219" cy="33" rx="12" ry="7.5" fill="#8a5a2b" transform="rotate(-36 219 33)"/>
            <path d="M213,37 L225,29" stroke="#fff" stroke-width="1.6" transform="rotate(0)"/>
            ${labelEls}
          </svg>`;
        }
        function rebuildAccuracy(profile, theme) {
          const sec = els.mount.querySelector(".qb-section-accuracy") || findSectionByTitle("Accuracy");
          const inner = panelInnerOf(sec);
          const tables = profile.accuracySection?.tables || [];
          if (!inner || !tables.length) return;

          const panes = [];
          const labels = [];

          const rates = tables.find((t) => t.layout !== "incompletion");
          if (rates && (rates.rows || []).length) {
            labels.push("Ball placement");
            const by = {};
            const extras = [];
            (rates.rows || []).forEach((row) => {
              const kind = classifyAccRow(row.label);
              if (kind === "other" && by.other) extras.push(row);
              else by[kind] = row;
            });
            const ringVals = {
              acc: by.acc?.displayValue ?? null,
              catchable: by.catchable?.displayValue ?? null,
              uncatchable: by.uncatchable?.displayValue ?? null,
            };
            const heroCard = by.plus ? `
              <div class="acc-hero-card qb-animate-item">
                <div><span class="v">${escapeHtml(by.plus.displayValue || "—")}</span><span class="l">${escapeHtml(by.plus.label)}</span></div>
                ${rankChip(by.plus)}
              </div>` : "";
            const rowCard = (row, kind) => {
              const dot = ACC_RING_COLORS[kind] === null ? theme.accent : (ACC_RING_COLORS[kind] || "#9CA3AF");
              return `<div class="acc-row qb-animate-item">
                <span class="dot" style="background:${escapeAttr(dot)}"></span>
                <span class="lbl">${escapeHtml(row.label)}</span>
                <span class="val" style="color:${escapeAttr(accColor(row))}">${escapeHtml(row.displayValue || "—")}</span>
                ${rankChip(row)}
              </div>`;
            };
            const metricRows = [
              by.acc ? rowCard(by.acc, "acc") : "",
              by.catchable ? rowCard(by.catchable, "catchable") : "",
              by.uncatchable ? rowCard(by.uncatchable, "uncatchable") : "",
              by.other ? rowCard(by.other, "other") : "",
              ...extras.map((r) => rowCard(r, "other")),
            ].join("");
            panes.push(`<div class="acc-wrap">
              <div class="acc-stage qb-animate-item">
                ${receiverSvg(theme, ringVals)}
                <div class="acc-legend">
                  ${ringVals.acc != null ? `<span><i style="background:${escapeAttr(theme.accent)}"></i>Accurate</span>` : ""}
                  ${ringVals.catchable != null ? `<span><i style="background:#E8A020"></i>Catchable miss</span>` : ""}
                  ${ringVals.uncatchable != null ? `<span><i style="background:#D04040"></i>Uncatchable</span>` : ""}
                </div>
              </div>
              <div class="acc-metrics">${heroCard}${metricRows}</div>
            </div>`);
          }

          const inc = tables.find((t) => t.layout === "incompletion");
          if (inc && (inc.rows || []).length) {
            labels.push("Why throws missed");
            const maxShare = inc.rows.reduce((m, r) => Math.max(m, r.share || 0), 0) || 1;
            const ledger = inc.rows.map((row) => {
              const color = accColor({ ...row, value: row.share, format: "pct" });
              const w = ((row.share || 0) / maxShare) * 100;
              return `<div class="inc-row qb-animate-item" style="--ic:${escapeAttr(color)}">
                <span class="inc-count">${escapeHtml(String(Math.round(row.count || 0)))}</span>
                <span class="lbl">${escapeHtml(row.label)}</span>
                <span class="inc-track"><i style="width:${w.toFixed(1)}%"></i></span>
                <span class="shr">${escapeHtml(row.displayShare || "—")}</span>
              </div>`;
            }).join("");
            const kicker = inc.totalIncompletions != null
              ? `<p class="annual-kicker">${escapeHtml(Math.round(inc.totalIncompletions).toLocaleString("en-US"))} incompletions · cause share · ranks vs qualifying QBs</p>` : "";
            panes.push(`${kicker}<div class="inc-ledger">${ledger}</div>`);
          }

          if (!panes.length) return;
          inner.innerHTML = labels.length > 1
            ? annualTabsHtml(labels) + `<div class="annual-panes">${panes.map((p, i) => `<div class="annual-pane${i === 0 ? " is-active" : ""}">${p}</div>`).join("")}</div>`
            : panes[0];
        }

        function gbRow(row, showAtt) {
          const grade = row.grade;
          const color = gradeColor(grade);
          const w = grade != null ? Math.max(0, Math.min(100, grade)) : 0;
          const high = w > 55;
          const att = showAtt && row.attempts != null
            ? `<small>${escapeHtml(Math.round(row.attempts).toLocaleString("en-US"))} att</small>` : "";
          return `<div class="gb-row qb-animate-item${row.rank === 1 ? " is-rank1" : ""}">
            <span class="gb-label">${escapeHtml(row.label)}${att}</span>
            <span class="gb-meter${high ? " is-high" : ""}" style="--gc:${escapeAttr(color)}; --gw:${w.toFixed(1)}%">
              <i style="width:${w.toFixed(1)}%"></i><span class="gv">${FMT.grade(grade)}</span>
            </span>
            ${rankChip(row)}
          </div>`;
        }
        function rebuildPassingGrades(profile) {
          const sec = els.mount.querySelector(".qb-section-pass-tables") || findSectionByTitle("Grades by throw type and situation");
          const inner = panelInnerOf(sec);
          const tables = profile.passingGradesTables?.tables || [];
          if (!inner || !tables.length) return;

          const panes = tables.map((table, idx) => {
            const showAtt = !!(table.showAttempts || table.type === "rows");
            const flat = (table.type === "grouped"
              ? (table.groups || []).flatMap((g) => g.rows || [])
              : (table.rows || [])).filter((r) => r.grade != null);

            // spotlight: strengths & pressure points
            let spotlight = "";
            const ranked = flat.filter((r) => r.rank != null);
            const pool = ranked.length >= 4 ? [...ranked].sort((a, b) => a.rank - b.rank)
              : [...flat].sort((a, b) => b.grade - a.grade);
            if (pool.length >= 4) {
              const best = pool.slice(0, 3);
              const worst = pool.slice(-3).reverse();
              const item = (r) => `<span class="item"><span>${escapeHtml(r.label)}</span><span class="g" style="color:${escapeAttr(gradeColor(r.grade))}">${FMT.grade(r.grade)}</span></span>`;
              spotlight = `<div class="gb-spotlight qb-animate-item">
                <div class="gb-spot" style="--gs:#156a3c"><span class="tag">Where he wins</span>${best.map(item).join("")}</div>
                <div class="gb-spot" style="--gs:#9b1c1c"><span class="tag">Pressure points</span>${worst.map(item).join("")}</div>
              </div>`;
            }

            const groups = table.type === "grouped"
              ? (table.groups || []).map((g) => ({ label: g.label, rows: (g.rows || []).filter((r) => r.grade != null) }))
              : [{ label: "", rows: flat }];
            const body = groups.filter((g) => g.rows.length).map((g) => {
              const rows = [...g.rows].sort((a, b) => (b.grade ?? -1) - (a.grade ?? -1));
              return `${g.label ? `<h4 class="gb-group-title">${escapeHtml(g.label)}</h4>` : ""}
                <div class="gb-rows">${rows.map((r) => gbRow(r, showAtt)).join("")}</div>`;
            }).join("");

            return `<div class="annual-pane${idx === 0 ? " is-active" : ""}">${spotlight}${body}</div>`;
          });

          inner.innerHTML =
            `<p class="annual-kicker">Bar length = PFF grade · sorted best to worst · ranks vs qualifying QBs</p>` +
            annualTabsHtml(tables.map((t) => t.shortTitle || t.title)) +
            `<div class="annual-panes">${panes.join("")}</div>`;
        }

        function customizeSections(profile, theme) {
          safe(() => mergeSeasonDonutSections(), "donut merge");
          safe(() => rebuildQbAlignment(profile, theme), "alignment rebuild");
          safe(() => rebuildPassingSplits(profile), "splits rebuild");
          safe(() => rebuildAllowedPressures(profile, theme), "pressures rebuild");
          safe(() => rebuildClutch(profile, theme), "clutch rebuild");
          safe(() => rebuildAccuracy(profile, theme), "accuracy rebuild");
          safe(() => rebuildPassingGrades(profile), "grade board rebuild");
          // chapters: everything open, headers become editorial
          els.mount.querySelectorAll(".qb-collapsible-details").forEach((d) => { d.open = true; });
          armRings(els.mount);
        }

        function renderHero(profile, theme) {

          els.heroWatermark.textContent = lastName;

          const logo = teamLogoUrl(current?.franchiseId);

          const gradeEntry = (profile.seasonGrades || []).find((g) => String(g.season) === String(season));

          els.heroStats.innerHTML = `
            <div class="hero-grade-card">
              <div class="grade-ring">
                <svg viewBox="0 0 74 74">
                  <circle class="bg" cx="37" cy="37" r="32" fill="none" stroke-width="7"></circle>
                  <circle class="fg" cx="37" cy="37" r="32" fill="none" stroke-width="7"
                    stroke-dasharray="0 ${C.toFixed(1)}" data-dash="${(C * pct).toFixed(1)}" data-circ="${C.toFixed(1)}"></circle>
                </svg>
                <span class="val">${grade != null ? Number(grade).toFixed(1) : "—"}</span>
              </div>
              <div class="grade-meta">
                <p class="lbl">${escapeHtml(season)} pass grade</p>
                <p class="rk">${gradeEntry && gradeEntry.rank != null
