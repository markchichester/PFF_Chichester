                  : "<small>not qualifying</small>"}</p>
              </div>
            </div>
            ${stats.map((s) => `
              <div class="hero-stat">
                <p class="lbl">${escapeHtml(s.label)}</p>
                <p class="val">${escapeHtml(String(s.value ?? "—"))}</p>
              </div>`).join("")}
          `;
          requestAnimationFrame(() => requestAnimationFrame(() => {
            const fg = els.heroStats.querySelector(".grade-ring .fg");
            if (fg) fg.setAttribute("stroke-dasharray", fg.dataset.dash + " " + (parseFloat(fg.dataset.circ) - parseFloat(fg.dataset.dash)));
          }));
        }

        function renderRail() {
          if (railObserver) { railObserver.disconnect(); railObserver = null; }
          const sections = [...els.mount.querySelectorAll(".qb-section")];
          const chips = [];
          sections.forEach((sec, i) => {
            const titleEl = sec.querySelector(".qb-collapsible-title, .qb-section-title, h2, h3");
            const title = (titleEl?.textContent || "").trim();
            if (!title) return;
            const id = "sec-" + i;
            sec.id = id;
            chips.push({ id, title });
          });
          els.rail.innerHTML = chips.map((c) =>
            `<button type="button" class="rail-chip" data-target="${escapeAttr(c.id)}">${escapeHtml(c.title)}</button>`
          ).join("");

          // scrollspy
          const chipById = {};
          els.rail.querySelectorAll(".rail-chip").forEach((chip) => { chipById[chip.dataset.target] = chip; });
          railObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              els.rail.querySelectorAll(".rail-chip.is-active").forEach((c) => c.classList.remove("is-active"));
              const chip = chipById[entry.target.id];
              if (chip) {
                chip.classList.add("is-active");
                chip.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });
              }
            });
          }, { rootMargin: "-30% 0px -60% 0px", threshold: 0 });
          sections.forEach((sec) => { if (sec.id) railObserver.observe(sec); });
        }

        function renderDataNotes(profile) {
          const notes = [...(lastLoadErrors || []), ...((profile.errors || []))];
          if (!notes.length) { els.dataNotes.hidden = true; return; }

          const btn = document.getElementById("notesToggle");
          const list = document.getElementById("notesList");
          btn.addEventListener("click", () => {

        function updateTopbar(qb) {
          els.qbSwitchName.textContent = qb.playerName;
          els.qbSwitchImg.src = headshotUrl(qb.playerId);
          els.qbSwitchImg.onerror = () => { els.qbSwitchImg.removeAttribute("src"); };

        let swapToken = 0;
        async function showQb(qb, { scrollTop = true } = {}) {
          if (!qb) return;
          const token = ++swapToken;
          current = qb;
          const theme = applyTheme(window.QbAnnualTeams.resolve(qb.franchiseId).primary);
          updateTopbar(qb);
          els.content.classList.add("is-swapping");

          if (token !== swapToken) return;

          const profile = buildProfileFor(qb);

          // buildExportModalCss carries the fixed/centered modal styles (the builder
          // gets these from css/app.css, which this page intentionally doesn't load)

          const profileEl = els.mount.querySelector(".qb-profile");
          safe(() => window.QbAnnualAnimations?.init(null, profileEl), "animations");
          safe(() => window.QbAnnualModals?.init(document.body, profile), "modals");
          safe(() => window.QbAnnualSections?.init(els.mount), "sections");
          // sections.js only initializes these on summary-click; chapters are

          const host = els.mount;
          safe(() => window.QbAnnualGradingProfile?.init(host), "scatter plots");
          safe(() => window.QbAnnualPassingSplits?.init(host), "carousel tabs");
          safe(() => window.QbAnnualInterceptionLuck?.init(host), "int luck");
          safe(() => window.QbAnnualTargetDepth?.init(host), "target depth");
          safe(() => window.QbAnnualAccuracyDepth?.init(host), "accuracy depth");
          safe(() => window.QbAnnualTargetMap?.init(host), "target map");
          safe(() => window.QbAnnualRouteTree?.init(host), "route tree");

          els.content.classList.remove("is-swapping");
          if (scrollTop) window.scrollTo({ top: 0, behavior: "smooth" });
          writeHash();
          persist();

        /* ---------------- switcher ---------------- */

        let coverMode = false;
        function openSwitcher({ cover = false } = {}) {
          coverMode = cover;
          els.switcherClose.style.display = cover ? "none" : "";
          els.switcher.hidden = false;
          els.switcher.classList.remove("is-leaving");

        function closeSwitcher() {

        /* ---------------- chrome wiring ---------------- */
        function wireChrome() {
          window.addEventListener("scroll", () => {
            const h = document.documentElement;
            const max = h.scrollHeight - h.clientHeight;
            els.progress.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + "%";
            els.topbar.classList.toggle("is-stuck", h.scrollTop > els.hero.offsetHeight - 120);
          }, { passive: true });

          els.qbSwitchBtn.addEventListener("click", () => openSwitcher());
          els.brandBtn.addEventListener("click", () => openSwitcher());
          els.switcherClose.addEventListener("click", closeSwitcher);
          els.switcherSearch.addEventListener("input", () => renderSwitcherGrid(els.switcherSearch.value));
          els.switcherGrid.addEventListener("click", (e) => {
            const card = e.target.closest(".qb-card[data-id]");
            if (!card) return;
            const qb = qbOrder.find((p) => String(p.playerId) === card.dataset.id);
            closeSwitcher();
            showQb(qb);
          });

          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && !els.switcher.hidden && !coverMode) closeSwitcher();
            if (e.key === "/" && els.switcher.hidden && !/INPUT|TEXTAREA|SELECT/.test(document.activeElement?.tagName || "")) {
              e.preventDefault();
              openSwitcher();
            }
          });

          els.prevQb.addEventListener("click", () => stepQb(-1));
          els.nextQb.addEventListener("click", () => stepQb(1));

          els.seasonSelect.addEventListener("change", () => {
            season = els.seasonSelect.value;
            if (current) showQb(current, { scrollTop: false });
          });

          /* Guaranteed interactivity layer — delegated, so it works even if a
             module's direct binding failed. Actions are idempotent with the
             modules' own handlers. */
          els.mount.addEventListener("click", (e) => {
            const tab = e.target.closest(".qb-compare-tab[data-split-target], .qb-scatter-tab[data-chart-target], .qb-target-map-tab[data-map-slide-target]");
            if (!tab) return;
            const kinds = [
              { tabSel: ".qb-compare-tab", car: ".qb-compare-carousel", track: ".qb-compare-track", slide: ".qb-compare-slide", data: "splitTarget", slideAttr: "data-split-id" },
              { tabSel: ".qb-scatter-tab", car: ".qb-scatter-carousel", track: ".qb-scatter-track", slide: ".qb-scatter-slide", data: "chartTarget", slideAttr: "data-chart-id" },
              { tabSel: ".qb-target-map-tab", car: ".qb-target-map", track: ".qb-target-map-track", slide: ".qb-target-map-slide", data: "mapSlideTarget", slideAttr: "data-map-slide" },
            ];
            const k = kinds.find((x) => tab.matches(x.tabSel));
            if (!k) return;
            const carousel = tab.closest(k.car);
            const track = carousel?.querySelector(k.track);
            const id = tab.dataset[k.data];
            if (!track || !id) return;
            const slide = track.querySelector(`${k.slide}[${k.slideAttr}="${(window.CSS && CSS.escape) ? CSS.escape(id) : id}"]`);
            if (!slide) return;
            const tr = track.getBoundingClientRect(), sr = slide.getBoundingClientRect();
            track.scrollTo({ left: track.scrollLeft + (sr.left - tr.left), behavior: "smooth" });
            carousel.querySelectorAll(k.tabSel).forEach((b) =>
              b.setAttribute("aria-pressed", b.dataset[k.data] === id ? "true" : "false"));
          });

          // scatter point hover/click → QB info panel (fallback mirror of grading-profile.js)
          function scatterPanel(stage, pt) {
            const wrap = stage?.querySelector(".qb-scatter-panel-wrap--hover");
            if (!wrap) return;
            const stageRect = stage.getBoundingClientRect();
            const ptRect = pt.getBoundingClientRect();
            const px = ptRect.left + ptRect.width / 2 - stageRect.left;
            const py = ptRect.top + ptRect.height / 2 - stageRect.top;
            const W = 232, H = 132;
            let left = px + 18, top = py - H - 12;
            if (left + W > stageRect.width - 8) left = px - W - 18;
            if (left < 8) left = 8;
            if (top < 8) top = py + 18;
            if (top + H > stageRect.height - 8) top = stageRect.height - H - 8;
            const d = pt.dataset;
            wrap.innerHTML = `<div class="qb-scatter-panel qb-scatter-panel--hover">
              <img class="qb-scatter-panel-photo" src="${escapeAttr(d.headshot || "")}" alt="" width="56" height="56" loading="lazy" />
              <div class="qb-scatter-panel-body">
                <p class="qb-scatter-panel-name">${escapeHtml(d.playerName || "")}</p>
                <p class="qb-scatter-panel-team">${escapeHtml(d.teamName || "—")}</p>
                <dl class="qb-scatter-panel-stats">
                  <div><dt>Pass grade</dt><dd>${escapeHtml(d.passGrade || "—")}</dd></div>
                  <div><dt>${escapeHtml(d.xLabel || "")}</dt><dd>${escapeHtml(d.xValue || "—")}</dd></div>
                  <div><dt>${escapeHtml(d.yLabel || "")}</dt><dd>${escapeHtml(d.yValue || "—")}</dd></div>
                </dl>
              </div>
            </div>`;
            wrap.style.left = left + "px";
            wrap.style.top = top + "px";
            wrap.hidden = false;
          }
          els.mount.addEventListener("mouseover", (e) => {
            const pt = e.target.closest?.(".qb-scatter-point");
            if (pt) safe(() => scatterPanel(pt.closest(".qb-scatter-stage"), pt), "scatter hover");
          });
          els.mount.addEventListener("mouseout", (e) => {
            const pt = e.target.closest?.(".qb-scatter-point");
            if (!pt) return;
            const wrap = pt.closest(".qb-scatter-stage")?.querySelector(".qb-scatter-panel-wrap--hover");
            if (wrap) { wrap.hidden = true; wrap.innerHTML = ""; }
          });
          els.mount.addEventListener("click", (e) => {
            const pt = e.target.closest?.(".qb-scatter-point");
            if (pt) safe(() => scatterPanel(pt.closest(".qb-scatter-stage"), pt), "scatter click");
          });

          // segmented tabs inside customized sections
          els.mount.addEventListener("click", (e) => {
            const tab = e.target.closest(".annual-tab[data-annual-tab]");
            if (!tab) return;
            const tabs = tab.closest(".annual-tabs");
            const panes = tabs?.parentElement.querySelector(".annual-panes");
            if (!tabs || !panes) return;
            const idx = parseInt(tab.dataset.annualTab, 10);
            tabs.querySelectorAll(".annual-tab").forEach((t) => t.setAttribute("aria-pressed", t === tab ? "true" : "false"));
            [...panes.children].forEach((pane, i) => pane.classList.toggle("is-active", i === idx));
            const active = panes.children[idx];
            if (active) {
              window.QbAnnualAnimations?.revealSection?.(active);
              armRings(active);
            }
          });

          els.rail.addEventListener("click", (e) => {
            const chip = e.target.closest(".rail-chip[data-target]");
            if (!chip) return;
            const sec = document.getElementById(chip.dataset.target);
            if (!sec) return;
            const details = sec.querySelector("details");
            if (details && !details.open) details.open = true;
            const y = sec.getBoundingClientRect().top + window.scrollY - 124;
            window.scrollTo({ top: y, behavior: "smooth" });
          });

          window.addEventListener("hashchange", () => {
            const h = readHash();
            if (h.season && h.season !== season) { season = h.season; els.seasonSelect.value = season; }
            if (h.qb && h.qb !== String(current?.playerId)) {
              const qb = qbOrder.find((p) => String(p.playerId) === h.qb);
              if (qb) showQb(qb);
            }
          });
        }

        function stepQb(dir) {
          if (!current || !qbOrder.length) return;
          const i = qbOrder.findIndex((p) => String(p.playerId) === String(current.playerId));
          const next = qbOrder[(i + dir + qbOrder.length) % qbOrder.length];
          showQb(next, { scrollTop: false });
        }

        /* ---------------- boot ---------------- */
        async function init() {
          try {
            if (location.protocol === "file:" && !window.QbAnnualBundledData) {
              els.loader.innerHTML = '<div class="loader-mark">QB Annual 2026</div><p style="font-weight:600;max-width:420px;text-align:center;line-height:1.5">Bundled CSV data is missing. Run <code>python3 scripts/bundle-data.py</code> in this folder, or serve with <code>python3 -m http.server 8766</code>.</p>';
              return;
            }
            await loadAllData();
            buildQbOrder();
            wireChrome();

            const hash = readHash();
            const saved = restore();
            season = hash.season || saved.season || "2025";
            els.seasonSelect.value = ["2023", "2024", "2025"].includes(season) ? season : "2025";
            season = els.seasonSelect.value;

            const wantedId = hash.qb || saved.playerId || "";
            const qb = qbOrder.find((p) => String(p.playerId) === String(wantedId));

            els.loader.classList.add("is-done");
            setTimeout(() => els.loader.remove(), 500);

            if (qb) {
              showQb(qb, { scrollTop: false });
            } else {
              // first visit: theme from a marquee QB, then show the cover
              const first = qbOrder[0];
              if (first) applyTheme(window.QbAnnualTeams.resolve(first.franchiseId).primary);
              openSwitcher({ cover: true });
              if (first) showQb(first, { scrollTop: false });
            }
          } catch (err) {
            console.error(err);
            els.loader.innerHTML = '<div class="loader-mark">QB Annual 2026</div><p style="font-weight:600">' +
              escapeHtml(err.message || "Could not load data.") + "</p>";
          }
        }

        init();
      })();
    </script>
  </body>
</html>
